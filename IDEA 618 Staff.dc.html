<div class="stx" style="min-height: 100vh; background: #eeede7; color: #1a1c1a; font-family: 'Public Sans', system-ui, sans-serif; font-size: 14px;">

          {{ backLabel }}

        <div style="width: 44px; height: 3px; background: #103d2c; margin-bottom: 22px;"></div>
        <div style="font-size: 11px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: #8c8e87; margin-bottom: 12px;">{{ gateKicker }}</div>
        <h1 style="font-family: 'Archivo', sans-serif; font-weight: 800; font-size: 26px; line-height: 1.14; letter-spacing: -.02em; margin: 0 0 10px;">{{ gateTitle }}</h1>
        <p style="font-size: 14px; color: #5c5f5a; line-height: 1.55; margin: 0 0 22px; max-width: 52ch;">Enter the password to continue. All figures are public federal data.</p>
        <div style="display: flex; gap: 8px;">

          <button type="submit" style="font: inherit; font-weight: 700; font-size: 14.5px; color: #fff; cursor: pointer; background: #103d2c; border: none; border-radius: 9px; padding: 11px 20px;">Enter</button>
        </div>
        <div style="min-height: 20px; margin-top: 12px; font-size: 13px; font-weight: 600; color: #a8501f;">{{ err }}</div>
      </form>
    </div>
  </sc-if>

  <header style="position: sticky; top: 0; z-index: 40; background: #eeede7; border-bottom: 1px solid #dedcd3;">
    <div style="max-width: 1360px; margin: 0 auto; padding: 0 24px; height: 56px; display: flex; align-items: center; gap: 18px;">
      <div style="display: flex; align-items: center; gap: 11px;">
        <a href="IDEA 618 Hub.dc.html" title="Back to the hub" style="display: flex; align-items: baseline; text-decoration: none; color: inherit;">
          <span style="font-family: 'Archivo', sans-serif; font-weight: 800; font-size: 16px; letter-spacing: -.02em;">IDEA&thinsp;618</span>
        </a>
        <span style="width: 1px; height: 15px; background: #cbcabf;"></span>
        {{ modeSwitcher }}
      </div>
      <nav style="margin-left: 10px; display: flex; gap: 2px;">
        <sc-if value="{{ isLead }}" hint-placeholder-val="{{ false }}"><button class="st-tab" type="button" onclick="{{ goBrief }}" style="{{ tabs.brief }}">Briefing</button></sc-if>
        <sc-if value="{{ isLead }}" hint-placeholder-val="{{ false }}"><button class="st-tab" type="button" onclick="{{ goInsights }}" style="{{ tabs.insights }}">Insights</button></sc-if>
        <button class="st-tab" type="button" onclick="{{ goState }}" style="{{ tabs.state }}">State</button>
        <button class="st-tab" type="button" onclick="{{ goCompare }}" style="{{ tabs.compare }}">Compare</button>
        <button class="st-tab" type="button" onclick="{{ goMap }}" style="{{ tabs.map }}">National map</button>
        <button class="st-tab" type="button" onclick="{{ goBuild }}" style="{{ tabs.builder }}">Build</button>

      <div style="margin-left: auto; display: flex; align-items: center; gap: 10px;">
        <button type="button" onclick="{{ openQS }}" aria-label="Search states, districts, categories, and analyses" style="display: inline-flex; align-items: center; gap: 8px; font: inherit; font-size: 12.5px; color: #8c8e87; background: #fff; border: 1px solid #dedcd3; border-radius: 8px; padding: 6px 12px; cursor: text; width: min(230px, 30vw); min-width: 120px;">
          <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="#8c8e87" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.2-3.2"/></svg>
          <span style="flex: 1; text-align: left; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">Search states, districts, categories…</span>

        </button>
      </div>
    </div>

  <sc-if value="{{ notReady }}" hint-placeholder-val="{{ true }}">
    <div style="max-width: 1360px; margin: 0 auto; padding: 120px 24px; text-align: center; color: #8c8e87; font-size: 14px;">Loading the Section&nbsp;618 collections&hellip;</div>
  </sc-if>

  {{ body }}
  {{ qsOverlay }}

</div>

  componentDidMount() {

      if (self.state.locked) return;

    };
    window.addEventListener('keydown', this._key);

      if (window.IDERIVE && window.IDERIVE.ready() && window.IChart && window.IChart2 && window.USMAP) { self.setState({ ready: true }); if (self._pendingBuild) { self._applyBuildHash(self._pendingBuild); self._pendingBuild = null; } return; }

  }
  _applyBuildHash(cfg) {
    if (!cfg || !cfg.id) return;

      this.setState({ view: 'builder', bTopic: idx, bType: cfg.type || null, bOpts: bo, bColor: cfg.color || '#103d2c', bNote: cfg.note || '', bTitle: cfg.title != null ? cfg.title : null });
    } catch (e) {}
  }
  componentWillUnmount() { if (this._key) window.removeEventListener('keydown', this._key); if (this._a6t) { clearInterval(this._a6t); this._a6t = null; } }

  // ---------- helpers ----------
  h() { return this.C.createElement.apply(this.C, arguments); }
  get C() { return React; }
  P() { return window.IChart.PAL; }
  fmtNum(n) { return window.IChart.num(n); }
  money(n) { return window.IChart.money(n); }
  dollars(n) { return n == null ? '\u2013' : '$' + Math.round(n).toLocaleString('en-US'); }
  pct(n, d) { return n == null ? '\u2013' : n.toFixed(d == null ? 1 : d) + '%'; }
  exPct(v) { return v == null ? 'N/A' : v.toFixed(0) + '%'; }
  // plain-language name for a suppression code pair (small cell -8 vs data quality -9/*)
  suppTypeWords(a8, a9) {
    if (a8 && a9) return 'small cell size and data quality';
    if (a9) return 'a data-quality concern';
    if (a8) return 'small cell size';
    return 'suppression';
  }
  // one calm note describing how much of the exiting data is suppressed and of what type
  exSuppNote(ex) {
    var h = this.h.bind(this), self = this; if (!ex) return null;
    // SEA-level state totals (the default): a clean state figure, no district weighting.
    if (ex.sea) {
      var sl = [];
      if (ex.gradNA) sl.push('Graduation rate is N/A: the state did not report a usable graduate count in the SEA Exiting Collection.');
      if (ex.dropNA) sl.push('Dropout rate is N/A: the state did not report a usable dropout count in the SEA Exiting Collection.');
      if (!sl.length) return null;
      return h('div', { style: { fontSize: 11, color: '#6a6c65', background: '#f6f5ef', border: '1px solid #e8e6dc', borderRadius: 8, padding: '8px 10px', marginTop: 10, lineHeight: 1.5 } }, sl.join(' '));
    }

    if (ex.gradNA) lines.push('Graduation rate is reported as N/A: districts serving about ' + r(ex.gradSuppShare) + '% of this state\u2019s exiters had the graduate count suppressed (' + self.suppTypeWords(sp.g8, sp.g9) + '), so a reliable rate cannot be calculated.');
    else if (ex.gradSuppShare > 0.01) lines.push('The graduation rate covers districts serving ' + r(1 - ex.gradSuppShare) + '% of exiters; the graduate count was suppressed for about ' + r(ex.gradSuppShare) + '% (' + self.suppTypeWords(sp.g8, sp.g9) + ').');
    if (ex.dropNA) lines.push('Dropout rate is reported as N/A: districts serving about ' + r(ex.dropSuppShare) + '% of exiters had the dropout count suppressed (' + self.suppTypeWords(sp.d8, sp.d9) + '), so a reliable rate cannot be calculated.');

  download(name, rows, opts) {

  card(title, sub, body, extra, exp) {

    var srcOnly = (typeof exp === 'string') ? exp : null;

    var id = exp ? ('exc-' + (this._cardN = (this._cardN || 0) + 1)) : null;

    var subEl = sub ? h('div', { style: { fontSize: 12, color: '#8c8e87', marginBottom: 12, marginTop: 2, lineHeight: 1.4 } }, sub) : null;

    var srcEl = srcText ? h('div', { style: { fontSize: 10.5, color: '#9a9b93', marginTop: 12, paddingTop: 10, borderTop: '1px solid #efeee7', lineHeight: 1.5 } }, 'Source: ' + srcText) : null;
    if (exp) {

          h('div', { style: { fontSize: 10.5, fontWeight: 700, letterSpacing: '.05em', textTransform: 'uppercase', color: '#8c8e87', lineHeight: 1.3, minHeight: 26 } }, k.label),
          h('div', { style: { fontFamily: "'Archivo',sans-serif", fontWeight: 700, fontSize: 24, letterSpacing: '-.02em', marginTop: 5, color: k.color, fontVariantNumeric: 'tabular-nums' } }, k.value),
          k.delta ? h('div', { style: { fontSize: 11, fontWeight: 700, marginTop: 3, fontVariantNumeric: 'tabular-nums', color: k.delta.up ? '#2f8f57' : '#b23b2e' } }, (k.delta.up ? '\u25b2 ' : '\u25bc ') + k.delta.label) : null,
          h('div', { style: { fontSize: 11.5, color: '#5c5f5a', marginTop: 3, lineHeight: 1.35 } }, k.sub));

  exportBtn(scopeSel, exp) {

        h('button', { type: 'button', 'aria-label': 'Zoom out', onClick: function () { zoom('out'); }, style: bs }, '−'),
        h('button', { type: 'button', 'aria-label': 'Reset zoom', onClick: function () { zoom('reset'); }, style: Object.assign({}, bs, { width: 'auto', padding: '0 10px', fontSize: 12 }) }, 'Reset'),
        h('button', { type: 'button', 'aria-label': 'Zoom in', onClick: function () { zoom('in'); }, style: bs }, '+')),

  // ---------- statistics (exact, no libraries) ----------

  // ---------- DISPROPORTIONALITY / OVER-REPRESENTATION ----------
  // Every index here is computed live from the reported files; nothing is invented.
  // Two ideas, kept separate on purpose:
  //   identification rate  = share of a state's students served under IDEA (are more/fewer children identified?)
  //   representation index = a category's share of a district/state's served students, divided by the national share.

    var LC = window.ILEACAT, LEA = window.LEAALL && window.LEAALL.states;

    var states = {}, dists = [];
    Object.keys(LEA).forEach(function (ab) {
      var st = []; for (var z = 0; z < nc; z++) st.push(0);
      (LEA[ab] || []).forEach(function (r) {
        var key = String(r[1]).replace(/^0+/, ''), c = byN[key]; if (!c) return;
        var dt = 0, any = false;
        for (var i = 0; i < nc; i++) { var v = c[i]; if (v != null) { st[i] += v; natl[i] += v; dt += v; any = true; } }
        if (any && dt > 0) dists.push({ name: r[0], ab: ab, nces: r[1], cat: c, total: dt });
      });
      var stTot = st.reduce(function (a, b) { return a + b; }, 0);
      states[ab] = { cat: st, total: stTot };
