<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1120,&quot;height&quot;:1500}}">
class Component extends DCLogic {
  state = { open: null };
  PHOTOS = [
    { src:'photos/27a2c36b.jpeg', cap:'the proposal', title:'The Proposal', info:'December 28, 2025. Josh got down on one knee under thousands of lights at the Missouri Botanical Garden Garden Glow.' },
    { src:'photos/67e91f5e.jpeg', cap:'save-the-date · Tidal Basin', title:'Save-the-Dates', info:'Peak cherry-blossom bloom at the Tidal Basin in Washington, DC, the week we shot our save-the-dates.' },
    { src:'photos/407027a6.jpeg', cap:'', title:'Hand in Hand', info:'A slow walk under the blossoms on a DC spring afternoon.' },
    { src:'photos/b854ce93.jpeg', cap:'', title:'Mid-Laugh', info:'Exactly how most of our photos seem to turn out, and we would not have it any other way.' },
    { src:'photos/7d4930e9.jpeg', cap:'she said yes', title:'She Said Yes', info:'The ring, fresh off the big question.' },
    { src:'photos/604e566a.jpeg', cap:'', title:'The Lift', info:'Blossom season, feet fully off the ground.' },
    { src:'photos/1a5c64f7.jpeg', cap:'', title:'Foreheads Together', info:'Petals everywhere, and just the two of us.' },
    { src:'photos/c8656871.jpeg', cap:'easy, from the start', title:'Black & White', info:'Easy and unhurried, the way it has felt from the very start.' },
    { src:'photos/71eb91a4.jpeg', cap:'', title:'Nose to Nose', info:'Pink in every direction at the Tidal Basin.' },
    { src:'photos/98f112c7.jpeg', cap:'', title:'In the Petals', info:'Sitting together in a carpet of fallen cherry blossoms.' },
    { src:'photos/5f604113.jpeg', cap:'DC in the spring', title:'By the Water', info:'A soft spring afternoon along the basin in DC.' },
    { src:'photos/def79e77.jpeg', cap:'', title:'At Home', info:'Just us, being us, ring and all.' },
    { src:'photos/29562008.jpeg', cap:'', title:'In the Lights', info:'Dancing through the holiday lights at the garden where it all became official.' },
  ];
  open = (i) => () => this.setState({ open: i });
  close = () => this.setState({ open: null });
  stop = (e) => e.stopPropagation();
  next = () => this.setState(s => ({ open: (s.open + 1) % this.PHOTOS.length }));
  prev = () => this.setState(s => ({ open: (s.open - 1 + this.PHOTOS.length) % this.PHOTOS.length }));
  renderVals() {
    const rots = [-1.2,.9,-.7,1.2,-1,.8,-.9,1.2,-1.2,.9,-.8,1,-1];
    const photos = this.PHOTOS.map((p, i) => {
      const cardStyle = `display:block;width:100%;text-align:center;position:relative;background:#FFFDF7;padding:12px 12px ${p.cap?40:12}px;border:1px solid #EFE7D2;box-shadow:0 2px 4px rgba(96,78,42,.05),0 24px 42px -26px rgba(96,78,42,.45);cursor:pointer;transform:rotate(${rots[i % rots.length]}deg)`;
      return { src:p.src, cap:p.cap, hasCap:!!p.cap, cardStyle, onOpen:this.open(i), showTurn: i === 6 };
    });
    const o = this.state.open;
    return { photos, open: o != null, active: o != null ? this.PHOTOS[o] : {}, close:this.close, stop:this.stop, next:this.next, prev:this.prev };
  }
}
</script>
