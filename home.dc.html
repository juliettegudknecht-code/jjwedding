@keyframes spinIn{0%{opacity:0;transform:perspective(700px) rotateY(-520deg)}100%{opacity:1;transform:perspective(700px) rotateY(0deg)}}
.jjpic{animation:spinIn 2.4s cubic-bezier(.2,.75,.3,1);transition:transform 1.8s ease;cursor:pointer}
.jjpic:hover{transform:perspective(700px) rotateY(360deg)}
.callaL{transform:rotate(-4deg);transform-origin:bottom center;transition:transform .6s cubic-bezier(.34,1.5,.5,1);cursor:pointer}
.callaL:hover{transform:rotate(-7deg) scale(1.12)}
.callaR{transform:scaleX(-1) rotate(-4deg);transform-origin:bottom center;transition:transform .6s cubic-bezier(.34,1.5,.5,1);cursor:pointer}
.callaR:hover{transform:scaleX(-1) rotate(-7deg) scale(1.12)}

<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = { showIntro: (() => { try { return !sessionStorage.getItem('jj_intro'); } catch (e) { return false; } })() };
  componentDidMount() { try { sessionStorage.setItem('jj_intro', '1'); } catch (e) {} }
  renderVals() {
    const target = new Date('2027-05-15T15:00:00');
    const now = new Date();
    const days = Math.max(0, Math.ceil((target - now) / 86400000));
    return { daysToGo: days, showIntro: this.state.showIntro };
  }
}
