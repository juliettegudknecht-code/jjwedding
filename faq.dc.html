<script>

<style>

@keyframes hpetalFall{0%{transform:translateY(-20px);opacity:0}8%{opacity:.7}80%{opacity:.7}100%{transform:translateY(300px);opacity:0}}

.btn{display:inline-block;padding:14px 30px;border-radius:2px;background:#C0674A;color:#FFF7F0;font-family:'Hanken Grotesk',sans-serif;font-weight:600;font-size:12.5px;letter-spacing:.16em;text-transform:uppercase;text-decoration:none;border:none;cursor:pointer;box-shadow:0 12px 22px -12px rgba(138,63,34,.55);transition:background .2s ease,transform .2s ease,box-shadow .2s ease}
.btn:hover{background:#A9542F;transform:translateY(-1px);box-shadow:0 16px 26px -12px rgba(138,63,34,.6)}

/* ---- the questions ---- */
.faqrow{border-bottom:1px solid #E4D8B8;padding:2px 2px}
.faqrow:first-child{border-top:1px solid #E4D8B8}
.faqbtn{width:100%;background:none;border:none;padding:20px 4px;cursor:pointer;display:flex;align-items:center;gap:16px;text-align:left}
.faqbtn:hover .faqq{color:#C0674A}
.faqq{transition:color .18s ease}

@media (max-width:560px){.faqbtn{padding:18px 2px}.faqrow .faqa{padding:0 6px 18px 30px !important;margin-left:8px !important}}

    <div class="hpetal" style="left:52%;--d:17s;--dl:-11s;--s:6.2s"><svg width="11" height="11" viewBox="-10 -11 20 22"><path d="M0,-9 C6,-7 9,-1 6,6 C4,10 1,11 0,8 C-1,11 -4,10 -6,6 C-9,-1 -6,-7 0,-9 Z" fill="#F7D2DC" stroke="#E7A9BB" stroke-width=".9"></path></svg></div>
    <div class="hpetal" style="left:87%;--d:15s;--dl:-7s;--s:5.8s"><svg width="12" height="12" viewBox="-10 -11 20 22"><path d="M0,-9 C6,-7 9,-1 6,6 C4,10 1,11 0,8 C-1,11 -4,10 -6,6 C-9,-1 -6,-7 0,-9 Z" fill="#F7D2DC" stroke="#E7A9BB" stroke-width=".9"></path></svg></div>
    <h1>Good Questions</h1>
    <p class="sub">Tap a question to open it. Still stumped? Just ask us.</p>
    <div style="display:flex;justify-content:center;margin-top:10px"><svg viewBox="0 0 56 40" width="58" height="42" style="overflow:visible;opacity:.9"><g transform="translate(13,24) rotate(-28) scale(.85)"><path d="M0,-9 C6,-7 9,-1 6,6 C4,10 1,11 0,8 C-1,11 -4,10 -6,6 C-9,-1 -6,-7 0,-9 Z" fill="#F7D2DC" stroke="#E7A9BB" stroke-width=".9"></path></g><g transform="translate(30,12) rotate(18)"><path d="M0,-9 C6,-7 9,-1 6,6 C4,10 1,11 0,8 C-1,11 -4,10 -6,6 C-9,-1 -6,-7 0,-9 Z" fill="#F7D2DC" stroke="#E7A9BB" stroke-width=".9"></path></g><g transform="translate(45,26) rotate(64) scale(.68)"><path d="M0,-9 C6,-7 9,-1 6,6 C4,10 1,11 0,8 C-1,11 -4,10 -6,6 C-9,-1 -6,-7 0,-9 Z" fill="#F7D2DC" stroke="#E7A9BB" stroke-width=".9"></path></g><circle cx="22" cy="33" r="2" fill="#F7D2DC" stroke="#E7A9BB" stroke-width=".7"></circle><circle cx="40" cy="8" r="1.7" fill="#F7D2DC" stroke="#E7A9BB" stroke-width=".7"></circle></svg></div>
  </div>

  <div style="max-width:720px;margin:34px auto 0;padding:0 22px;animation:fadeUp .6s ease-out both">

    <div style="font-family:'Shantell Sans',cursive;font-size:19px;color:#C0674A">psst, ask us about the guest scavenger hunt</div>
    <a href="our-story.dc.html" class="btn" style="margin-top:14px">Retrace our first date →</a>
  </div>

  <dc-import name="SiteFooter" hint-size="100%,320px"></dc-import>

<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1120,&quot;height&quot;:1100}}">
class Component extends DCLogic {
  state = { open: -1 };
  toggle = (i) => () => this.setState({ open: this.state.open === i ? -1 : i });
  renderVals() {
    const data = [
      { q:"When should I RSVP by?", a:"Please reply through the RSVP page as soon as you know. We'll set a firm date closer to the wedding, but earlier is always kinder to our planning." },
      { q:"What should I wear?", a:"Garden semi-formal. Think warm terracotta, blush, sage, and ivory. Dress up, stay comfortable, and pick shoes that are happy on stone garden paths." },
      { q:"Is the venue indoors or outdoors?", a:"Both, in a way. The Jewel Box is a glass greenhouse, so you're inside but surrounded by plants and light. Expect a little cozy warmth, dress in layers you can peel." },
      { q:"Can I bring a plus one?", a:"Your invitation will list exactly who's included. If you're unsure, just ask us. We want the right people in the room and no awkward surprises." },
      { q:"Are kids welcome?", a:"We kindly ask that children be immediate family only, meaning our nieces and nephews. Note their needs on the RSVP so we can plan." },
      { q:"Is there parking?", a:"Yes, free parking sits right beside The Jewel Box in Forest Park, with more lots across from the Visitor Center." },
      { q:"Is the venue wheelchair accessible?", a:"Yes. The Jewel Box and the Trolley Room both have accessible entrances, restrooms, and nearby accessible parking. If the walk between the two is not for you, it is a quick drive, and every MetroLink train and station is accessible too. Reach out and we'll happily help you plan." },
      { q:"Where did you go to high school?", a:"Spoken like a true St. Louisan. It's the city's favorite icebreaker; try it on a local at the reception and watch them light up." },
      { q:"What is this scavenger hunt everyone mentions?", a:"A little wedding-day game. Complete photo missions around the venue, from finding our hidden monstera to catching the best dance move, and collect the treasure. Head to the Our Story page to play it before the big day." },
      { q:"Any dietary needs, can you accommodate?", a:"Absolutely. Note any allergies or dietary needs on your RSVP and we'll make sure there's something wonderful for you to eat." },
    ];
    const openIdx = this.state.open;
    const faqs = data.map((d, i) => {
      const open = i === openIdx;
      return { q:d.q, a:d.a, open, mark: open ? 'ok, close it' : 'open me', leafCls: open ? 'faqleaf open' : 'faqleaf', onToggle:this.toggle(i) };
    });
    return { faqs };
  }
}
</script>
