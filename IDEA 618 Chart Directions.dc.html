<script type="text/x-dc" data-dc-script>

  // ============ 1b ANALYST CONSOLE ============

    var keyMap = { aut: 'Autism', sld: 'Specific learning disability', ohi: 'Other health impairment', id: 'Intellectual disability', ed: 'Emotional disturbance' };

    var xlab = I.YEARS.slice(startIdx);

      var vals = arr.map(function (v, idx) { return v == null ? null : share ? +(v / I.ALL[idx] * 100).toFixed(2) : v * 1000; }).slice(startIdx);

    });

    var toggleChips = h('div', { style: { display: 'flex', flexWrap: 'wrap', gap: 6, marginBottom: 8 } }, serMeta.map(function (m) {
      var on = self.state.bSeries[m[0]];

        })));
    };
    var controls = h('div', { style: { display: 'flex', flexWrap: 'wrap', gap: '10px 16px', alignItems: 'center', marginBottom: 10 } },
      seg('Measure', [['count', 'Count'], ['share', 'Share']], this.state.bMode, 'bMode'),
      seg('Range', [['all', 'All'], ['2000', '2000\u2013'], ['2010', '2010\u2013'], ['2016', '2016\u2013']], this.state.bRange, 'bRange'));

    return this.optionCol('1b', 'The Analyst Console', 'Denser and more hands-on. A live small-multiple grid puts every category\u2019s trajectory in one glance, and the trend chart lets you toggle series, normalize Count \u2194 Share, and zoom a year range without leaving the card. Built for the analyst who wants to interrogate, not just read.', [

  // ============ 1c NEW VOCABULARY ============
  col_1c() {

    // slope: category share 2000 vs 2025
    var slopeCats = [['Specific learning disability', 'Learning disability', K.navy, false], ['Autism', 'Autism', K.accent, true], ['Speech or language impairment', 'Speech / language', K.green, false], ['Other health impairment', 'Other health', K.gold, false], ['Intellectual disability', 'Intellectual', K.blue, false], ['Emotional disturbance', 'Emotional dist.', K.purple, false], ['Developmental delay', 'Developmental delay', K.greenL, false]];

    });
    var bee = C2.beeswarm(React, { w: 604, h: 196, points: pts, xFmt: function (v) { return v.toFixed(0) + '%'; }, refLine: { value: 15.2, label: 'U.S. 15.2%' }, xLabel: '% of public-school enrollment served under IDEA Part B', r: 5.5, ariaLabel: 'Each state positioned by share of enrollment served, colored by its Part B determination.' });
    var detLegend = h('div', { style: { display: 'flex', flexWrap: 'wrap', gap: '4px 14px', marginTop: 8, fontSize: 10.5, color: K.muted } }, [['Meets requirements', '#2f8f57'], ['Needs assistance (1 yr)', '#c99a2e'], ['Needs assistance (2+ yrs)', '#cf6b35'], ['Needs intervention', '#b23b2e']].map(function (d, i) {
